name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - name: Type-check
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      - name: Verify bundle is up to date
        run: |
          git diff --exit-code scaffold/scaffold.js || {
            echo "::error::scaffold/scaffold.js is out of date. Run 'yarn build' and commit the result."
            exit 1
          }
