# =============================================================================
# {{PROJECT_NAME}} — HTTPS Development Proxy (nginx)
# =============================================================================
# Terminates SSL with a self-signed certificate and forwards requests to the
# local development servers running on the host machine:
#   /api/*  → Node.js webapi  (port {{BACKEND_PORT}})
#   /*      → Vite dev server (port {{FRONTEND_PORT}})
#
# Access the application at: https://dev.{{PROJECT_NAME_LOWER}}.local:{{HTTPS_PORT}}
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # --- Upstreams (host-running dev servers) --------------------------------

    upstream webapi {
        server host.docker.internal:{{BACKEND_PORT}};
    }

    upstream vite {
        server host.docker.internal:{{FRONTEND_PORT}};
    }

    # --- WebSocket upgrade detection -----------------------------------------
    # Sets Connection header to "upgrade" only when the client sends an Upgrade
    # header (used by Vite HMR). Otherwise falls back to "close".

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTPS server --------------------------------------------------------

    server {
        listen 443 ssl;
        server_name dev.{{PROJECT_NAME_LOWER}}.local;

        # Self-signed certificate (generated by generate-certs.sh)
        ssl_certificate     /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        # --- API routes → Node.js webapi ------------------------------------
        # All /api routes go to the backend. If the webapi serves additional
        # routes outside /api, add more location blocks below, e.g.:
        #
        #   location /auth   { proxy_pass http://webapi; ... }
        #   location /health { proxy_pass http://webapi; ... }
        #
        location /api {
            proxy_pass http://webapi;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Everything else → Vite dev server (including HMR WebSocket) -----
        location / {
            proxy_pass http://vite;
            proxy_http_version 1.1;

            # WebSocket support for Vite HMR — the map directive above sets
            # Connection to "upgrade" only when the Upgrade header is present
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
