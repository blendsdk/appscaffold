services:
  db:
    image: postgres:16-alpine
    ports:
      - "{{DB_PORT}}:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Amsterdam
      PGTZ: Europe/Amsterdam
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - ../temp/dev-db:/var/lib/postgresql/data
      - ../resources/database:/resources
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass secret
    ports:
      - "{{REDIS_PORT}}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # HTTPS reverse proxy — terminates SSL and forwards to host-running
  # Vite dev server and Node.js webapi. Access at:
  #   https://dev.{{PROJECT_NAME_LOWER}}.local:{{HTTPS_PORT}}
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "{{HTTPS_PORT}}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
{{DOCKER_MAILPIT_PARTIAL}}
